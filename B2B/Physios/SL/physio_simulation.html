<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klinik-Simulator: Fall Markus T.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-10 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="text-white w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Klinik-Simulator: Fall Markus T.</h1>
            </div>
            <div id="chat-header-info" class="hidden flex items-center gap-4">
                <div class="text-sm font-bold px-3 py-1 bg-blue-50 border border-blue-100 rounded-full text-blue-700">
                    Austausch: <span id="exchange-counter">0</span> / 12
                </div>
                <button onclick="resetSimulation()" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main id="app-container" class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 flex flex-col overflow-hidden">
        <!-- Screens will be injected here -->
    </main>

    <footer class="py-4 text-center text-slate-400 text-[10px] uppercase tracking-widest font-bold">
        Interaktives Fallbeispiel • Klinische Psychologie & Physiotherapie
    </footer>

    <script>
        const apiKey = ""; // Wird von der Umgebung bereitgestellt
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        
        let state = {
            currentScreen: 'briefing',
            briefingRead: false,
            messages: [],
            exchangeCount: 0,
            isTyping: false,
            isConversationEnded: false
        };

        const SYSTEM_PROMPT = `
            Rolle: Du bist Markus T. (41), ein ambitionierter Marathonläufer (PB 2:58h, Ziel Sub-2:50h).
            Kontext: Du bist in einer Physiotherapie-Praxis wegen chronischer Fußschmerzen beidseits (VAS 5-6 beim Laufen).
            Medizinische Historie: Du hattest in den letzten 4 Jahren drei Stressfrakturen (MT II links, MT III rechts, MT II rechts). Das aktuelle MRT zeigt ein Knochenmarködem (MT II + III) – ein massives Warnsignal.
            Persönlichkeit (Endurer-Typ): Du bist diszipliniert, ehrgeizig, ruhig und kontrolliert. Dein Motto: "No pain, no gain". Pausen sind für dich Schwäche. Laufen ist deine Identität ("Ich BIN Läufer").
            Ziel: Du willst einen Behandlungsplan, der dich SCHNELL wieder fit macht, OHNE dass du das Training reduzieren musst. Du planst, in 3 Monaten wieder voll zu laufen.
            Versteckte Komplexität (nur bei guten Fragen offenbaren):
            1. Sozialer Druck: Deine Laufgruppe (2x/Woche) ist dein sozialer Kern; du hast Angst, dort den Anschluss zu verlieren.
            2. Stress: Du arbeitest 50h/Woche als IT-Projektleiter, hast eine 8-jährige Tochter und deine Frau ist genervt von deinen ständigen Verletzungen ("Du ruinierst dich"). Laufen ist dein einziges Stressventil.
            3. Paradox: Du machst alle Kraftübungen perfekt (hohe Compliance), ignorierst aber konsequent Pausenempfehlungen (schlechte Adhärenz bei Erholung).
            
            Regeln für die KI:
            - Antworte in 2-4 Sätzen. Sei direkt und sachlich.
            - Bleibe IMMER in der Rolle. Coach den Lernenden nicht.
            - Wenn der Therapeut nur zustimmt, nimm das begeistert an und korrigiere ihn nicht.
            - Zeige zu Beginn direkt dein MRT-Bild/Ergebnis.
            - SPRACHE: DEUTSCH.
        `;

        function render() {
            const container = document.getElementById('app-container');
            const headerInfo = document.getElementById('chat-header-info');

            if (state.currentScreen === 'briefing') {
                headerInfo.classList.add('hidden');
                container.innerHTML = `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex-1 flex flex-col">
                        <div class="p-6 md:p-8 flex-1 overflow-y-auto custom-scrollbar">
                            <div class="flex items-center gap-3 mb-6">
                                <div class="bg-orange-50 p-3 rounded-full border border-orange-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="text-orange-600 w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                </div>
                                <h2 class="text-2xl font-bold text-slate-800">Briefing: Chronische Fußschmerzen</h2>
                            </div>

                            <div class="grid md:grid-cols-2 gap-6 mb-8">
                                <div class="space-y-4">
                                    <h3 class="font-bold text-slate-900 flex items-center gap-2 border-b pb-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Patientendaten
                                    </h3>
                                    <div class="text-sm space-y-2 text-slate-600">
                                        <p><strong>Name:</strong> Markus T. (41 J.)</p>
                                        <p><strong>Beruf:</strong> IT-Projektleiter (50h/Woche)</p>
                                        <p><strong>Diagnose:</strong> Chron. Belastungsschmerzsyndrom beidseits</p>
                                        <p><strong>ICD-10:</strong> M25.57, M84.37, Z87.81</p>
                                    </div>
                                </div>
                                <div class="space-y-4">
                                    <h3 class="font-bold text-slate-900 flex items-center gap-2 border-b pb-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> Status & Historie
                                    </h3>
                                    <div class="text-sm space-y-2 text-slate-600">
                                        <p><strong>Historie:</strong> 3 Stressfrakturen (MT II/III) in 4 Jahren.</p>
                                        <p><strong>Aktuell:</strong> MRT zeigt Knochenmarködem beidseits.</p>
                                        <p><strong>Training:</strong> 60-70 km/Woche (trotz Schmerzen!).</p>
                                        <p><strong>Typ:</strong> Endurer (hohe Persistenz bei Schmerz).</p>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-blue-50 p-5 rounded-xl border border-blue-100 mb-6">
                                <h3 class="font-bold text-blue-900 mb-3 flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> Ihre Aufgabe
                                </h3>
                                <ul class="space-y-3 text-sm text-blue-800">
                                    <li class="flex gap-2"><span>•</span><span>Validieren Sie den Befund des MRT (Knochenmarködem).</span></li>
                                    <li class="flex gap-2"><span>•</span><span>Explorieren Sie psychosoziale Faktoren (Stress, Identität, Peer-Pressure).</span></li>
                                    <li class="flex gap-2"><span>•</span><span>Erarbeiten Sie eine Strategie zur Belastungsreduktion.</span></li>
                                </ul>
                            </div>
                        </div>

                        <div class="p-6 bg-slate-50 border-t border-slate-200 flex flex-col items-center gap-4">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <div id="checkbox-ui" class="w-6 h-6 rounded border-2 flex items-center justify-center transition-all ${state.briefingRead ? 'bg-blue-600 border-blue-600' : 'border-slate-300'}">
                                    ${state.briefingRead ? '<svg xmlns="http://www.w3.org/2000/svg" class="text-white w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
                                </div>
                                <input type="checkbox" class="hidden" onchange="toggleBriefingRead(this.checked)" ${state.briefingRead ? 'checked' : ''}>
                                <span class="text-slate-700 font-medium">Ich habe die medizinische Akte gesichtet.</span>
                            </label>

                            <button id="start-btn" onclick="startSimulation()" ${state.briefingRead ? '' : 'disabled'}
                                class="w-full md:w-80 py-4 px-8 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${state.briefingRead ? 'bg-blue-600 text-white shadow-lg hover:bg-blue-700 active:scale-95' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}">
                                Simulation starten <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            } else {
                headerInfo.classList.remove('hidden');
                document.getElementById('exchange-counter').innerText = state.exchangeCount;
                
                container.innerHTML = `
                    <div class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden max-h-full">
                        <!-- Chat Header -->
                        <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="relative">
                                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold border-2 border-white shadow-sm overflow-hidden">
                                        M
                                    </div>
                                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                                </div>
                                <div>
                                    <h3 class="font-bold text-slate-900 leading-none">Markus T.</h3>
                                    <p class="text-[10px] text-slate-400 font-bold mt-1 tracking-wider uppercase">IT-Projektleiter • Marathonläufer</p>
                                </div>
                            </div>
                        </div>

                        <!-- Messages Area -->
                        <div id="messages-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 custom-scrollbar">
                            ${state.messages.map(msg => `
                                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-fadeIn">
                                    <div class="max-w-[85%] p-4 rounded-2xl ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-tr-none shadow-md' : 'bg-slate-100 text-slate-800 rounded-tl-none border border-slate-200'}">
                                        <p class="text-sm md:text-base leading-relaxed">${msg.text}</p>
                                    </div>
                                </div>
                            `).join('')}
                            
                            ${state.isTyping ? `
                                <div id="typing-indicator" class="flex justify-start animate-fadeIn">
                                    <div class="bg-slate-100 p-4 rounded-2xl rounded-tl-none border border-slate-200 flex gap-1">
                                        <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span>
                                        <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                                        <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                                    </div>
                                </div>
                            ` : ''}

                            ${state.isConversationEnded ? `
                                <div class="bg-slate-50 border-2 border-dashed border-slate-200 p-8 rounded-2xl text-center space-y-4 animate-fadeIn">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-blue-600 mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                    <h4 class="font-bold text-slate-900 text-xl">Anamnese abgeschlossen</h4>
                                    <p class="text-slate-600 text-sm max-w-sm mx-auto">Das Erstgespräch ist beendet. Haben Sie Markus' Adhärenz-Problematik adressieren können?</p>
                                    <button onclick="resetSimulation()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                                        Simulation neu starten
                                    </button>
                                </div>
                            ` : ''}
                        </div>

                        <!-- Input Area -->
                        <div class="p-4 bg-white border-t border-slate-100">
                            <form onsubmit="handleSendMessage(event)" class="relative flex gap-2">
                                <input
                                    id="chat-input"
                                    type="text"
                                    placeholder="${state.isConversationEnded ? 'Gespräch beendet' : 'Ihre therapeutische Antwort...'}"
                                    disabled="${state.isTyping || state.isConversationEnded}"
                                    class="flex-1 bg-slate-50 border border-slate-200 rounded-xl py-4 px-5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all disabled:opacity-50 text-slate-900"
                                />
                                <button
                                    type="submit"
                                    id="send-btn"
                                    disabled="${state.isTyping || state.isConversationEnded}"
                                    class="p-4 rounded-xl transition-all ${state.isTyping || state.isConversationEnded ? 'bg-slate-200 text-slate-400' : 'bg-blue-600 text-white shadow-lg hover:bg-blue-700 active:scale-95'}"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                </button>
                            </form>
                        </div>
                    </div>
                `;
                scrollToBottom();
            }
        }

        function toggleBriefingRead(checked) {
            state.briefingRead = checked;
            render();
        }

        function startSimulation() {
            state.currentScreen = 'chat';
            state.messages = [{ 
                role: 'ai', 
                text: "Hallo, ich bin Markus. Ich habe hier mein aktuelles MRT-Ergebnis dabei – da steht was von einem Knochenmarködem in beiden Füßen. Ich hoffe, Sie können mir helfen, damit ich mein Training für den Sub-2:50er Marathon nicht unterbrechen muss?" 
            }];
            render();
        }

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }

        async function fetchAIResponse(chatHistory) {
            const userQuery = chatHistory[chatHistory.length - 1].text;
            const formattedHistory = chatHistory.slice(0, -1).map(msg => ({
                role: msg.role === 'ai' ? 'model' : 'user',
                parts: [{ text: msg.text }]
            }));

            let currentSystemPrompt = SYSTEM_PROMPT;
            if (state.exchangeCount >= 10) {
                currentSystemPrompt += " Beende das Gespräch jetzt natürlich und verabschiede dich.";
            }

            const payload = {
                contents: [
                    ...formattedHistory,
                    { role: 'user', parts: [{ text: userQuery }] }
                ],
                systemInstruction: {
                    parts: [{ text: currentSystemPrompt }]
                }
            };

            let retries = 0;
            const maxRetries = 5;

            while (retries <= maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API failed');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Ich weiß gerade nicht weiter...";
                } catch (err) {
                    if (retries === maxRetries) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                    retries++;
                }
            }
        }

        async function handleSendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || state.isTyping || state.isConversationEnded) return;

            state.messages.push({ role: 'user', text });
            state.isTyping = true;
            state.exchangeCount++;
            input.value = '';
            render();

            try {
                const aiResponse = await fetchAIResponse(state.messages);
                state.messages.push({ role: 'ai', text: aiResponse });
                if (state.exchangeCount >= 11) {
                    state.isConversationEnded = true;
                }
            } catch (err) {
                console.error(err);
                state.messages.push({ role: 'ai', text: "Entschuldigung, es gab einen technischen Fehler." });
            } finally {
                state.isTyping = false;
                render();
            }
        }

        function resetSimulation() {
            state = {
                currentScreen: 'briefing',
                briefingRead: false,
                messages: [],
                exchangeCount: 0,
                isTyping: false,
                isConversationEnded: false
            };
            render();
        }

        // Initialer Start
        window.onload = render;
    </script>
</body>
</html>
