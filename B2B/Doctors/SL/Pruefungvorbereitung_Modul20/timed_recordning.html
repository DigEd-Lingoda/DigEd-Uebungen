<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprachaufnahme mit Timer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 650px;
            width: 100%;
        }
        .inputs {
            margin-bottom: 10px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            color: #4a5568;
        }
        input[type="number"] {
            width: 80px;
            padding: 8px;
            font-size: 16px;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            text-align: center;
            outline: none;
        }
        .display {
            font-size: 32px;
            font-weight: bold;
            color: #2d3748;
            margin: 10px 0 20px 0;
            font-variant-numeric: tabular-nums;
        }
        /* Aufnahme-Statusbereich */
        .recording-box {
            width: 100%;
            height: 180px;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }
        .recording-box.active {
            border-color: #153BFF;
            background-color: #edf2f7;
        }
        .status-dot {
            width: 16px;
            height: 16px;
            background-color: #cbd5e0;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .recording-box.active .status-dot {
            background-color: #e53e3e;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        .status-text {
            font-size: 16px;
            font-weight: bold;
            color: #718096;
        }
        /* Audio Player Styling */
        audio {
            width: 100%;
            margin-top: 15px;
            display: none; /* Erst nach Aufnahme sichtbar */
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-start { background-color: #153BFF; color: white; }
        .btn-start:hover { background-color: #0026e6; }
        .btn-submit { background-color: #48bb78; color: white; }
        .btn-submit:hover { background-color: #38a169; }
        .btn-submit:disabled { background-color: #cbd5e0; cursor: not-allowed; }
        .btn-reset { background-color: #a0aec0; color: white; }
        .btn-reset:hover { background-color: #718096; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="inputs" id="input-container">
        <label for="seconds-input">Zeitlimit (Sekunden):</label>
        <input type="number" id="seconds-input" min="1" value="660">
    </div>

    <div class="display" id="time-display">11:00</div>

    <div class="recording-box" id="record-box">
        <div class="status-dot"></div>
        <div class="status-text" id="status-message">Bereit für die Aufnahme. Klicke auf 'Starten'.</div>
        <audio id="audio-playback" controls></audio>
    </div>

    <div class="buttons">
        <button class="btn-start" id="start-btn" onclick="startTimer()">Starten</button>
        <button class="btn-submit" id="submit-btn" onclick="submitTask()" disabled>Abgeben</button>
        <button class="btn-reset" id="reset-btn" onclick="resetTimer()">Zurücksetzen</button>
    </div>
</div>

<script>
    let countdown;
    let timeLeft;
    let isRunning = false;
    
    // Variablen für die Audio-Aufnahme
    let mediaRecorder;
    let audioChunks = [];

    const display = document.getElementById('time-display');
    const inputContainer = document.getElementById('input-container');
    const secondsInput = document.getElementById('seconds-input');
    const recordBox = document.getElementById('record-box');
    const statusMessage = document.getElementById('status-message');
    const audioPlayback = document.getElementById('audio-playback');
    const startBtn = document.getElementById('start-btn');
    const submitBtn = document.getElementById('submit-btn');

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    secondsInput.addEventListener('input', () => {
        if (!isRunning) {
            let val = parseInt(secondsInput.value) || 0;
            display.textContent = formatTime(val);
        }
    });

    async function startTimer() {
        if (isRunning) return;

        if (timeLeft === undefined || timeLeft <= 0) {
            const totalSeconds = parseInt(secondsInput.value);
            if (isNaN(totalSeconds) || totalSeconds <= 0) {
                alert("Bitte gib eine gültige Sekundenzahl ein!");
                return;
            }
            timeLeft = totalSeconds;
        }

        // Versuchen, Zugriff auf das Mikrofon zu bekommen
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                // Wenn die Aufnahme stoppt, erstelle eine abspielbare Audiodatei (Blob)
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                audioPlayback.src = audioUrl;
                audioPlayback.style.display = 'block'; // Player anzeigen
                statusMessage.textContent = "Aufnahme beendet. Du kannst sie jetzt abhören.";
                
                // Mikrofon-Stream schließen (damit das rote Aufnahme-Symbol im Browser verschwindet)
                stream.getTracks().forEach(track => track.stop());
            };

            // Aufnahme starten
            mediaRecorder.start();
            
            // UI aktualisieren
            isRunning = true;
            startBtn.style.display = 'none';
            submitBtn.disabled = false;
            inputContainer.style.opacity = '0.5';
            secondsInput.disabled = true;
            
            recordBox.classList.add('active');
            statusMessage.textContent = "Aufnahme läuft... Bitte sprechen.";
            audioPlayback.style.display = 'none';

            display.textContent = formatTime(timeLeft);

            // Timer starten
            countdown = setInterval(() => {
                timeLeft--;
                display.textContent = formatTime(timeLeft);

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    playBeep();
                    endTask();
                }
            }, 1000);

        } catch (err) {
            alert("Mikrofonzugriff verweigert oder nicht verfügbar! Bitte erlaube den Zugriff, um aufzunehmen.");
            console.error("Mikrofon-Fehler:", err);
        }
    }

    function submitTask() {
        clearInterval(countdown);
        endTask();
    }

    function endTask() {
        isRunning = false;
        startBtn.style.display = 'inline-block';
        startBtn.disabled = true;
        submitBtn.disabled = true;
        
        recordBox.classList.remove('active');
        
        // Aufnahme stoppen, falls sie noch läuft
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }
    }

    function resetTimer() {
        clearInterval(countdown);
        isRunning = false;
        startBtn.style.display = 'inline-block';
        startBtn.disabled = false;
        submitBtn.disabled = true;
        
        // Reset der Audio-Elemente
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }
        audioPlayback.pause();
        audioPlayback.src = "";
        audioPlayback.style.display = 'none';
        
        recordBox.classList.remove('active');
        statusMessage.textContent = "Bereit für die Aufnahme. Klicke auf 'Starten'.";
        
        inputContainer.style.opacity = '1';
        secondsInput.disabled = false;
        
        const totalSeconds = parseInt(secondsInput.value) || 660;
        timeLeft = totalSeconds;
        display.textContent = formatTime(timeLeft);
    }

    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime + 1.8);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 2.0);
        } catch (e) {
            console.error("Audio konnte nicht abgespielt werden:", e);
        }
    }
</script>

</body>
</html>
