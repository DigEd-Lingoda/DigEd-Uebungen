<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schreibübung mit Timer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 650px;
            width: 100%;
        }
        .inputs {
            margin-bottom: 10px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            color: #4a5568;
        }
        input[type="number"] {
            width: 80px;
            padding: 8px;
            font-size: 16px;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            border-color: #4299e1;
        }
        .display {
            font-size: 32px;
            font-weight: bold;
            color: #2d3748;
            margin: 10px 0 20px 0;
            font-variant-numeric: tabular-nums;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 12px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }
        textarea:focus {
            border-color: #153BFF;
        }
        textarea:disabled {
            background-color: #edf2f7;
            color: #718096;
            cursor: not-allowed;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-start {
            background-color: #153BFF;
            color: white;
        }
        .btn-start:hover {
            background-color: #0026e6;
        }
        .btn-submit {
            background-color: #48bb78;
            color: white;
        }
        .btn-submit:hover {
            background-color: #38a169;
        }
        .btn-submit:disabled {
            background-color: #cbd5e0;
            cursor: not-allowed;
        }
        .btn-reset {
            background-color: #a0aec0;
            color: white;
        }
        .btn-reset:hover {
            background-color: #718096;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="inputs" id="input-container">
        <label for="seconds-input">Zeitlimit (Sekunden):</label>
        <input type="number" id="seconds-input" min="1" value="1320">
    </div>

    <div class="display" id="time-display">22:00</div>

    <textarea id="user-text" placeholder="Klicke auf 'Starten', um zu schreiben..." disabled></textarea>

    <div class="buttons">
        <button class="btn-start" id="start-btn" onclick="startTimer()">Starten</button>
        <button class="btn-submit" id="submit-btn" onclick="submitTask()" disabled>Abgeben</button>
        <button class="btn-reset" id="reset-btn" onclick="resetTimer()">Zurücksetzen</button>
    </div>
</div>

<script>
    let countdown;
    let timeLeft;
    let isRunning = false;

    const display = document.getElementById('time-display');
    const inputContainer = document.getElementById('input-container');
    const secondsInput = document.getElementById('seconds-input');
    const userText = document.getElementById('user-text');
    const startBtn = document.getElementById('start-btn');
    const submitBtn = document.getElementById('submit-btn');

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    secondsInput.addEventListener('input', () => {
        if (!isRunning) {
            let val = parseInt(secondsInput.value) || 0;
            display.textContent = formatTime(val);
        }
    });

    function startTimer() {
        if (isRunning) return;

        if (timeLeft === undefined || timeLeft <= 0) {
            const totalSeconds = parseInt(secondsInput.value);
            if (isNaN(totalSeconds) || totalSeconds <= 0) {
                alert("Bitte gib eine gültige Sekundenzahl ein!");
                return;
            }
            timeLeft = totalSeconds;
        }

        isRunning = true;
        startBtn.style.display = 'none';
        submitBtn.disabled = false;
        userText.disabled = false;
        userText.focus();
        inputContainer.style.opacity = '0.5';
        secondsInput.disabled = true;

        display.textContent = formatTime(timeLeft);

        countdown = setInterval(() => {
            timeLeft--;
            display.textContent = formatTime(timeLeft);

            if (timeLeft <= 0) {
                clearInterval(countdown);
                playBeep();
                endTask();
            }
        }, 1000);
    }

    function submitTask() {
        clearInterval(countdown);
        endTask();
    }

    function endTask() {
        isRunning = false;
        startBtn.style.display = 'inline-block';
        startBtn.disabled = true;
        submitBtn.disabled = true;
        userText.disabled = true;
    }

    function resetTimer() {
        clearInterval(countdown);
        isRunning = false;
        startBtn.style.display = 'inline-block';
        startBtn.disabled = false;
        submitBtn.disabled = true;
        userText.disabled = true;
        userText.value = '';
        inputContainer.style.opacity = '1';
        secondsInput.disabled = false;
        
        const totalSeconds = parseInt(secondsInput.value) || 660;
        timeLeft = totalSeconds;
        display.textContent = formatTime(timeLeft);
    }

    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime + 1.8);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 2.0);
        } catch (e) {
            console.error("Audio konnte nicht abgespielt werden:", e);
        }
    }
</script>

</body>
</html>
